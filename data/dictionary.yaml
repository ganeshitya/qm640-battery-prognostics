# =============================================================================
# QM640 Capstone — Data Dictionary
# Early-Life Prediction of Lithium-Ion Battery Cycle Life
#
# Machine-readable companion to Table 4 of the project synopsis.
# Two joined levels: cell_level (235 rows) and cycle_level (~180,000 rows),
# joined on cell_id.
#
# Validate a build against this file with:  python -m src.harmonise.validate
# =============================================================================

meta:
  version: "1.0.0"
  updated: "2026-07-23"
  eol_definition: "First cycle at which discharge capacity falls below 80% of nominal capacity."
  voltage_grid: "1000 equally spaced points over the common voltage window 2.0–3.5 V (LFP) or 2.7–4.2 V (LCO/NCA), rescaled to [0,1] before pooling."
  missing_sentinel: null    # nulls are stored as true nulls in Parquet, never as -999 or 0

# -----------------------------------------------------------------------------
# CELL LEVEL — one row per cell (n = 235)
# -----------------------------------------------------------------------------
cell_level:

  cell_id:
    type: string
    unit: null
    description: Unique identifier, prefixed by source (e.g. TRI_b1c03, NASA_B0005, OX_Cell1).
    role: key
    constraints: { unique: true, nullable: false, pattern: "^(TRI|NASA|CALCE|OX)_[A-Za-z0-9_]+$" }

  source:
    type: factor
    unit: null
    description: Originating repository.
    role: stratifier
    levels: [tri_2019, tri_2020, nasa_pcoe, calce, oxford]
    constraints: { nullable: false }

  chemistry:
    type: factor
    unit: null
    description: Cathode chemistry family.
    role: covariate
    levels: [LFP, LCO, NCA, NCO]
    constraints: { nullable: false }

  form_factor:
    type: factor
    unit: null
    description: Physical cell format.
    role: covariate
    levels: [cylindrical_18650, pouch, prismatic_pouch]
    constraints: { nullable: false }

  nominal_capacity:
    type: float
    unit: Ah
    description: Manufacturer rated capacity; used to normalise all capacity measures.
    role: normaliser
    constraints: { min: 0.5, max: 3.0, nullable: false }

  charge_policy:
    type: factor
    unit: null
    description: >
      Multi-step fast-charge policy label, verbatim from the source
      (e.g. "3.6C(80%)-3.6C"). Retained as a string because it is the RQ4
      grouping factor; parsed components appear below. Single-step CC-CV
      sources are encoded as "<rate>C(100%)-<rate>C".
    role: rq4_cluster
    constraints: { nullable: false, approx_levels: 82 }

  c1_rate:
    type: float
    unit: C
    description: First-step charging current rate, parsed from charge_policy.
    role: covariate
    constraints: { min: 0.2, max: 8.0, nullable: false }

  c2_rate:
    type: float
    unit: C
    description: Second-step charging current rate, parsed from charge_policy.
    role: covariate
    constraints: { min: 0.2, max: 8.0, nullable: false }

  soc_switch:
    type: float
    unit: percent
    description: State of charge at which the charging rate steps down. Set to 100 for single-step CC-CV sources.
    role: covariate
    constraints: { min: 0.0, max: 100.0, nullable: false }

  discharge_rate:
    type: float
    unit: C
    description: Discharge current rate. Null for Oxford cells, which use the ARTEMIS urban drive cycle rather than a constant rate.
    role: covariate
    constraints: { min: 0.2, max: 6.0, nullable: true }
    null_handling: "Null indicates a variable-rate drive-cycle discharge; the drive_cycle flag distinguishes this from a missing value."

  drive_cycle:
    type: boolean
    unit: null
    description: True if discharge follows a drive-cycle profile rather than constant current.
    role: covariate
    constraints: { nullable: false }

  ambient_temp:
    type: float
    unit: degC
    description: Environmental chamber set-point.
    role: rq4_covariate
    constraints: { min: 20.0, max: 50.0, nullable: false }

  dq_var:
    type: float
    unit: log10_Ah
    description: log10 of the variance of ΔQ(100-10)(V), the difference between the cycle-100 and cycle-10 discharge capacity–voltage curves.
    role: key_predictor
    constraints: { min: -8.0, max: 0.0, nullable: false }

  dq_min:
    type: float
    unit: log10_Ah
    description: log10 of the absolute minimum of ΔQ(100-10)(V).
    role: key_predictor
    constraints: { min: -6.0, max: 0.0, nullable: false }

  dq_skew:
    type: float
    unit: null
    description: Skewness of ΔQ(100-10)(V).
    role: predictor
    constraints: { min: -10.0, max: 10.0, nullable: false }

  dq_kurt:
    type: float
    unit: null
    description: Kurtosis of ΔQ(100-10)(V).
    role: predictor
    constraints: { min: -5.0, max: 100.0, nullable: false }

  fade_slope:
    type: float
    unit: Ah_per_cycle
    description: Ordinary least squares slope of discharge capacity on cycle index over cycles 2–100. Negative by construction.
    role: rq4_outcome
    constraints: { min: -0.01, max: 0.0, nullable: false }

  fade_intercept:
    type: float
    unit: Ah
    description: Intercept of the same fit; a proxy for effective initial capacity.
    role: predictor
    constraints: { min: 0.4, max: 3.0, nullable: false }

  q_cycle2:
    type: float
    unit: Ah
    description: Discharge capacity at cycle 2.
    role: predictor
    constraints: { min: 0.4, max: 3.0, nullable: false }

  q_max_minus_q2:
    type: float
    unit: Ah
    description: Difference between maximum observed capacity and cycle-2 capacity; captures early formation gain.
    role: predictor
    constraints: { min: -0.2, max: 0.5, nullable: false }

  charge_time_avg:
    type: float
    unit: s
    description: Mean time to charge from 0% to 80% state of charge, averaged over cycles 2–6.
    role: predictor
    constraints: { min: 200.0, max: 6000.0, nullable: true }
    null_handling: "Null where the source does not log a resolvable 0–80% window; imputed within training folds only, using the source-level median, never across the fold boundary."

  temp_integral:
    type: float
    unit: degC_cycles
    description: Integral of mean cell surface temperature over cycles 2–100.
    role: predictor
    constraints: { min: 1000.0, max: 8000.0, nullable: true }
    null_handling: "Null for sources without thermocouple logging (subset of CALCE). Handled by a missingness indicator column rather than imputation."

  ir_delta:
    type: float
    unit: mOhm
    description: Change in ohmic internal resistance between cycles 2 and 100.
    role: rq4_covariate
    constraints: { min: -5.0, max: 20.0, nullable: true }
    null_handling: "Null where the source records no resistance measurement; missingness indicator used."

  cycle_life:
    type: integer
    unit: cycles
    description: Cycles completed until the EOL threshold is first crossed.
    role: rq3_outcome
    constraints: { min: 100, max: 3000, nullable: false }

  log10_cycle_life:
    type: float
    unit: log10_cycles
    description: Modelling target for RQ3; back-transformed with a smearing correction before APE is computed.
    role: rq3_target
    constraints: { min: 2.0, max: 3.5, nullable: false }

  life_class:
    type: binary
    unit: null
    description: 1 if cycle_life < 550, else 0.
    role: rq1_rq2_outcome
    constraints: { values: [0, 1], nullable: false }

  censored:
    type: binary
    unit: null
    description: 1 if the test terminated before the 80% EOL threshold was reached (e.g. NASA cells stopped at 70%).
    role: exclusion_flag
    constraints: { values: [0, 1], nullable: false }
    null_handling: "Censored cells are retained in descriptive analysis, excluded from RQ3 primary analysis, and included in a sensitivity analysis reported alongside."

# -----------------------------------------------------------------------------
# CYCLE LEVEL — one row per cell-cycle (n ≈ 180,000)
# -----------------------------------------------------------------------------
cycle_level:

  cell_id:
    type: string
    unit: null
    description: Foreign key to cell_level.
    role: key
    constraints: { nullable: false }

  cycle_index:
    type: integer
    unit: count
    description: Sequential cycle number, starting at 1.
    role: index
    constraints: { min: 1, max: 3000, nullable: false }

  q_discharge:
    type: float
    unit: Ah
    description: Discharge capacity delivered in the cycle.
    role: measurement
    constraints: { min: 0.0, max: 3.0, nullable: false }

  q_charge:
    type: float
    unit: Ah
    description: Charge capacity accepted in the cycle.
    role: measurement
    constraints: { min: 0.0, max: 3.5, nullable: false }

  v_curve:
    type: array<float>
    unit: V
    description: Voltage sampled on the common 1000-point grid.
    role: measurement
    constraints: { length: 1000, min: 1.8, max: 4.3, nullable: false }

  i_curve:
    type: array<float>
    unit: A
    description: Current sampled on the same grid.
    role: measurement
    constraints: { length: 1000, min: -8.0, max: 8.0, nullable: false }

  t_cell:
    type: float
    unit: degC
    description: Mean cell surface temperature over the cycle.
    role: measurement
    constraints: { min: 15.0, max: 70.0, nullable: true }
    null_handling: "Null where no thermocouple is fitted; propagates to a null temp_integral at cell level."

  t_max:
    type: float
    unit: degC
    description: Peak cell surface temperature over the cycle.
    role: measurement
    constraints: { min: 15.0, max: 80.0, nullable: true }

  internal_res:
    type: float
    unit: mOhm
    description: Ohmic resistance measured at the characterisation cycle. Sparse — recorded only at diagnostic intervals.
    role: rq4_covariate
    constraints: { min: 5.0, max: 60.0, nullable: true }
    null_handling: "Expected null on non-diagnostic cycles. Forward-filled to the next diagnostic point only for visualisation, never for modelling."

  charge_time:
    type: float
    unit: s
    description: Time to charge from 0% to 80% state of charge in this cycle.
    role: feature_source
    constraints: { min: 100.0, max: 8000.0, nullable: true }

  soh_pct:
    type: float
    unit: percent
    description: Present discharge capacity divided by rated capacity, times 100.
    role: derived
    constraints: { min: 50.0, max: 110.0, nullable: false }

# -----------------------------------------------------------------------------
# GLOBAL VALIDATION RULES
# -----------------------------------------------------------------------------
validation:
  - "Every cycle_level.cell_id must appear exactly once in cell_level.cell_id."
  - "cycle_index must be gapless and strictly increasing within each cell_id."
  - "soh_pct must be monotonically non-increasing after a 5-cycle rolling median."
  - "cycle_life must equal the first cycle_index at which soh_pct < 80, unless censored = 1."
  - "life_class must equal 1 if and only if cycle_life < 550."
  - "No feature column may be imputed using statistics computed outside its training fold."
  - "Cells sharing a charge_policy must never be split across a train/test boundary in RQ4."
